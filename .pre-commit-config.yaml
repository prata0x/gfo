repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint + auto-fix)
        entry: python -m ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff (format)
        entry: python -m ruff format
        language: system
        types: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
