repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (lint + auto-fix)
        entry: python -m ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff (format)
        entry: python -m ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: python -m mypy src/gfo
        language: system
        pass_filenames: false
        types: [python]

      - id: bandit
        name: bandit
        entry: python -m bandit -r src/gfo -c pyproject.toml
        language: system
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest
        entry: python -m pytest --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
