[project]
name = "gfo"
version = "0.1.0"
description = "Git Forge Operator – a unified CLI for GitHub, GitLab, and more"
requires-python = ">=3.11"
dependencies = ["requests"]

[project.scripts]
gfo = "gfo.cli:main"

[project.optional-dependencies]
dev = ["pytest", "responses", "pytest-cov"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gfo"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=gfo --cov-report=term-missing"
