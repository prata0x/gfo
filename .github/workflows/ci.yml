# CI ワークフロー。lint (ruff) + format-check + type-check (mypy) + security (bandit) +
# 単体テスト (pytest) を実行する。
#
# Runner: gfo は public リポジトリで GitHub Actions が無料のため、全ジョブを GitHub-hosted の
# ubuntu-latest で回す (self-hosted は使わない)。
#
# Python バージョン: 対応下限 (min) と最新 (max) の 2 つを matrix で並列検証する。
# job 名にバージョン番号を入れず min/max ラベルにするのは、版を上げても check 名 (= Ruleset の
# 必須ステータスチェック名) が変わらないようにするため。さらに matrix を束ねる安定名 "ci" の
# aggregate gate job を置き、Ruleset の必須チェックは "ci" 一本で固定する (版更新で再設定不要)。
#
# 統合テストは実サービス (GitHub/GitLab 等) へアクセスするため CI では実行しない。
# pytest 設定 (pyproject.toml の addopts) で tests/integration を除外済み。
#
# ハードニング (public でも有効):
# - permissions: contents: read のみ → 供給網経由で GITHUB_TOKEN を奪取されても push 不能。
# - persist-credentials: false → .git/config への token 書き込みを抑止し git push 経路を塞ぐ。
# - 各 action は mutable tag ではなく 40 桁 commit SHA で pin する (OpenSSF / GitHub Hardening 推奨)。
#   trailing コメントの version 表記は Dependabot が更新時に参照する標準パターンなので残す。
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# 同一 ref への連続 push では古い run をキャンセルし、無駄な実行を避ける。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.label }})
    runs-on: ubuntu-latest
    # ハング時の保険。通常 1 分前後で終わる。
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      # 一方が落ちても他方の結果を見たいので fail-fast しない。
      fail-fast: false
      matrix:
        include:
          # min = 対応下限 / max = 最新。版を上げる時は python-version だけ差し替える
          # (label は変えない → check 名が安定し Ruleset 再設定が不要)。
          - { label: min, python-version: "3.11" }
          - { label: max, python-version: "3.13" }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # 自分の workflow が SHA pin を維持しているかを自己検証 (mutable tag を fail させる)。
      - name: Verify actions are SHA-pinned
        run: |
          bad=$(grep -rEn '^[[:space:]]*uses:[[:space:]]' .github/workflows | grep -vE '@[0-9a-f]{40}' || true)
          if [ -n "$bad" ]; then
            echo "::error::Action(s) not pinned to a 40-char commit SHA:"
            echo "$bad"
            exit 1
          fi

      # mise.toml の python / uv を供給する (ローカル開発と同一の toolchain)。
      # mise-action は python/uv の toolchain バイナリはキャッシュするが、uv の
      # パッケージキャッシュ (~/.cache/uv) はキャッシュしないため、下の cache step で補う。
      - name: Setup mise (python + uv)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      # uv のパッケージキャッシュ (~/.cache/uv = 展開済み wheel) を復元/保存し、毎ジョブの
      # wheel ダウンロードを省く。キーは uv.lock のハッシュ + OS + python 版で構成し、
      # lock 変更時のみ更新する (restore-keys で前回キャッシュにフォールバック)。
      - name: Cache uv packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-py${{ matrix.python-version }}-

      # uv.lock どおりに frozen install する。lock が古ければ fail (lockfile 整合性ゲート)。
      # dev は dependency-groups で定義されており uv sync が既定でインストールする。
      # --python で matrix のバージョンに .venv を作る (mise の既定 python を上書き)。
      - name: Install dependencies (frozen, python ${{ matrix.python-version }})
        run: uv sync --locked --python ${{ matrix.python-version }}

      # 違反を GitHub Actions の annotation 形式で PR diff に inline 表示し、違反で fail。
      - name: Lint (ruff)
        run: uv run ruff check --output-format=github .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src/gfo

      - name: Security scan (bandit)
        run: uv run bandit -r src/gfo -c pyproject.toml -q

      # runner は 4 vCPU 固定なので xdist は -n 4 を明示 (auto でも同等だが意図を固定)。
      # CI ではカバレッジを維持する (addopts から外したぶん明示的に付与)。
      # 3.13 (max) のみ coverage の sysmon コアを使い計測オーバーヘッドを抑える (3.11 は非対応)。
      - name: Unit tests (pytest)
        env:
          COVERAGE_CORE: ${{ matrix.label == 'max' && 'sysmon' || '' }}
        run: uv run pytest -n 4 --cov=gfo --cov-report=term-missing -q

  # matrix を束ねる安定名の必須チェック。Ruleset は "ci" だけを Require すればよく、
  # テスト対象バージョンを増減しても再設定不要。
  ci:
    name: ci
    needs: [test]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Gate on test matrix result
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix did not succeed (result=${{ needs.test.result }})"
            exit 1
          fi
